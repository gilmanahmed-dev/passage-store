                passage: `'My dear Mr. Bennet,' said his lady to him one day, 'have you heard that Netherfield Park is let at last?'
Mr. Bennet replied that he had not.
'But it is,' returned she, 'for Mrs. Long has just been here, and she told me all about it.'
Mr. Bennet made no answer.
'Do you not want to know who has taken it?' cried his wife impatiently.
'You want to tell me, and I have no objection to hearing it.'
This was invitation enough.
'Why, my dear, you must know, Mrs. Long says that Netherfield is taken by a young man of large fortune from the north of England; that he came down on Monday in a chaise and four to see the place, and was so much delighted with it that he agreed with Mr. Morris immediately; that he is to take possession before Michaelmas, and some of his servants are to be in the house by the end of next week.'
'What is his name?'
'Bingley.'
'Is he married or single?'
'Oh, single, to be sure! A single man of large fortune; four or five thousand a year. What a fine thing for our girls!'
'How so? How can it affect them?'
'My dear Mr. Bennet,' replied his wife, 'how can you be so tiresome? You must know that I am thinking of his marrying one of them.'
'Is that his design in settling here?'
'Design? Nonsense, how can you talk so! But it is very likely that he may fall in love with one of them, and therefore you must visit him as soon as he comes.'
'I see no occasion for that. You and the girls may go, or you may send them by themselves, which perhaps will be still better, for as you are as handsome as any of them, Mr. Bingley might like you the best of the party.'
'My dear, you flatter me. I certainly have had my share of beauty, but I do not pretend to be anything extraordinary now. When a woman has five grown-up daughters, she ought to give over thinking of her own beauty.'
'In such cases, a woman has not often much beauty to think of.'
'But, my dear, you must indeed go and see Mr. Bingley when he comes into the neighbourhood.'
'It is more than I engage for, I assure you.'
'But consider your daughters. Only think what an establishment it would be for one of them. Sir William and Lady Lucas are determined to go, merely on that account; for in general, you know, they visit no newcomers. Indeed you must go, for it will be impossible for us to visit him if you do not.'
'You are over-scrupulous, surely. I dare say Mr. Bingley will be very glad to see you; and I will send a few lines by you to assure him of my hearty consent to his marrying whichever he chooses of the girls, though I must throw in a good word for my little Lizzy.'
'I desire you will do no such thing. Lizzy is not a bit better than the others; and I am sure she is not half so handsome as Jane, nor half so good-humoured as Lydia. But you are always giving her the preference.'
'They have none of them much to recommend them,' replied he, 'they are all silly and ignorant like other girls; but Lizzy has something more of quickness than her sisters.'

                passage: `Colonel Blood was a reckless Irishman who, like many another soldier of fortune, made London his headquarters when Charles II was restored to the throne. He was a desperate ruffian, ready to take on any venture.
In the time of Charles II, the regalia was kept, without any of the precautions which safeguard it today, in an iron cage on the ground floor of the Martin Tower. The upper floors formed the living apartments of the keeper in charge of the jewels, an old man of nearly eighty named Talbot Edwards. His salary had been in abeyance for some time, which was not unusual in the reign of Charles II, and he was therefore allowed to take fees from visitors who wished to see the jewels. The only precaution observed was that as soon as anyone entered the jewel-house, Edwards locked the door.
One day in April 1671, an inoffensive country parson in bands and gown visited the tower with his wife. They said they were strangers in London and would like to see the Crown Jewels. The 'parson' was, of course, Colonel Blood, and the 'wife' was a female accomplice. While old Edwards was describing the regalia to his visitors, the 'wife' was suddenly seized with 'internal qualms,' and the kind-hearted old keeper invited his visitors to step upstairs, where Mrs. Edwards helped the 'parson's' wife to recover.
Thus Blood and his companion 'established confidence' in their victim, as the modern crook would express it. In a day or so, the 'parson' called to thank Mrs. Edwards and to give her a present of a pair of gloves. So the acquaintance grew into friendship, and the 'parson' with his 'wife' became frequent visitors in the Edwards' household. Edwards had an unmarried daughter and also a son, who was absent in Flanders. It was suggested that a marriage might be arranged between Miss Edwards and a nephew and ward of the 'parson,' an idea which found favour with the Edwards' family. A day was therefore appointed on which the 'parson' was to produce his nephew for inspection. Upon this day, just as it was growing dark, Blood, still disguised as a parson, arrived at the tower on horseback with four companions. One man was to hold the horses at St. Katherine's Gate, while Blood and the other three, one of whom was to impersonate the 'nephew,' were to steal the regalia. Blood was to steal the crown, an old ex-Ironside named Parrot was to pocket the orb, while a third rogue was to file the sceptre into three pieces and place them in a bag. The 'nephew' was to keep guard. The thieves were armed with sword-canes and a brace of pistols apiece.
Old Edwards greeted them warmly at the Martin Tower and said that his wife and daughter would be down in a moment. Blood remarked that, as his friends were strangers to London, they would like to see the Crown Jewels. The old man at once unlocked the jewel-room door, and the thieves trooped in, except the 'nephew,' who guarded the stairs with the coy remark that he would rather catch a glimpse of his bride than of any jewels! No sooner were the thieves inside than they knocked down Edwards and gagged him. Blood snatched the crown and smashed in the arches with a wooden mallet in order to make it easier to pocket. Parrot secured the orb, with its enormous ruby, while the third man began to file the sceptre. At this point there occurred one of those incredible surprises which no novelist would dare to introduce into fiction. Young Edwards, who was believed to be in Flanders, suddenly arrived home and was startled to find a stranger on the stairs. He ran up past the watching man to see his mother and sister.
Alarmed by this unexpected development, the 'nephew' lost his nerve and gave the alarm. The thieves opened the door and walked out calmly with the crown and the orb, leaving the half-filed sceptre behind. Edwards, freeing himself from the gag, began to shout that the Crown had been stolen.
The alarm spread until the tower was in confusion. Blood added to it as he ran, the crown hidden in his parson's gown, by shouting, 'Stop the rogues!' and pointing to running figures. Captain Beckenham, commanding the main guard, happened, more by luck than anything else, to spot Blood as the real thief, and he chased him out of the tower to St. Katherine's Wharf. There a rabble joined in the chase and captured the thieves as they were actually mounting their horses. Beckenham closed with Blood, who let off a pistol in his face, but it missed fire. The next instant Blood was captured, after a struggle in which several stones fell from the crown into the mud; a pearl was picked up by a sweeper, a diamond by an apprentice, and several stones were never recovered.
Parrot was also overpowered, the orb still in his breeches pocket. One of the rubies had worked loose and was found afterwards in his garments. As the thieves were being led off, Colonel Blood said over his shoulder to Captain Beckenham, 'Ah well, it was a gallant deed, although it failed. It was to gain a crown.'
The strangest part of the story, in an age when any petty theft was punishable by death, is perhaps the sequel. In a few days' time, Blood was summoned to Whitehall, where Charles II received him in private audience. It would be interesting to know what was said during this interview, for Blood emerged from it the owner of an estate in Ireland which brought in £500 a year! Charles II has never been cleared of the suspicion that, in need of ready money as usual, he had hired Blood to steal his own crown! Another rumour at the time was that the king had boasted that no man could steal the crown and, in order to bring himself to the king's notice, Blood had attempted to do so.`,

                author: "James Hilton",
                image: "lost horizon.jpeg",
                passage: `Suddenly they were all awakened by a lurch of the machine. Conway's head struck the window, dazing him for the moment; a returning lurch sent him floundering between the two tiers of seats. It was much colder. The first thing he did, automatically, was to glance at his watch; it showed half-past one — he must have been asleep for some time. His ears were full of a loud flapping sound, which he took to be imaginary until he realized that the engine had shut off and that the plane was rushing against a gale. Then he stared through the window and could see the earth quite close — vague and snail-grey, scampering underneath. 'He's going to land!' Mallinson shouted; and Barnard, who had also been flung out of his seat, responded with a saturnine: 'If he's lucky.' Miss Brinklow, whom the entire commotion seemed to have disturbed least of all, was adjusting her hat as calmly as if Dover harbour were just in sight.

Presently the plane touched ground. But it was a bad landing this time. Mallinson groaned as he clutched at his seat during ten seconds of crashing and swaying. Something was heard to strain and snap, and one of the tyres exploded. 'That's done it,' he added in tones of anguished pessimism. 'A broken tail-skid — we'll have to stay where we are now, that's certain.'

Conway, never talkative at times of crisis, stretched his stiffened legs and felt his head where it had banged against the window. A bruise — nothing much. He must do something to help these people. But he was the last of the four to stand up when the plane came to rest. 'Steady,' he called out as Mallinson wrenched open the door of the cabin and prepared to make the jump to earth; and eerily, in the comparative silence, the youth's answer came: 'No need to be steady — this looks like the end of the world — there's not a soul about, anyhow.'

A moment later, chilled and shivering, they were all aware that this was so. With no sound in their ears save the fierce gusts of wind and their own crunching footsteps, they felt themselves at the mercy of something dour and savagely melancholy — a mood in which both earth and air were saturated. The moon looked to have disappeared behind clouds, and starlight illumined a tremendous emptiness heaving with wind. Without thought or knowledge, one could have guessed that this bleak world was mountain-high, and that the mountains rising from it were mountains on top of mountains. A range of them gleamed on a far horizon like a row of dog-teeth.

Mallinson, feverishly active, was already making for the cockpit. 'I'm not scared of the fellow on land, whoever he is,' he cried. 'I'm going to tackle him right away.'

The others watched, hypnotized by the spectacle of such energy, though apprehensive also. Conway sprang after him, but too late to prevent the investigation. After a few seconds, however, the youth dropped down again, gripping his arm, and muttering in a hoarse, sobered staccato: 'I say, Conway, it's queer. I think the fellow's ill or dead or something. I can't get a word out of him. Come up and look. I took his revolver, at any rate.'

'Better give it to me,' said Conway, and though still rather dazed by the recent blow on his head, he nerved himself for action. Of all times and places and situations on earth, this seemed to him to combine the most hideous discomforts. He hoisted himself stiffly into a position from which he could see, not very well, into the enclosed cockpit. There was a strong smell of petrol, so he did not risk striking a match. He could just discern the pilot, huddled forward, his head sprawling over the controls. He shook him, unfastened his helmet, and loosened his clothes round his neck. A moment later he turned round to report: 'Yes, there's something happened to him. We must get him out.' But an observer might have added that something had happened to Conway as well. His voice was sharper, more incisive; no longer did he sound to be hovering on the brink of some profound doubtfulness. The time, the place, the cold, his fatigue, were now of less account; there was a job that simply had to be done, and the more conventional part of him was uppermost and preparing to do it.

With Barnard and Mallinson assisting, the pilot was extracted from his seat and lifted to the ground. He was unconscious, not dead. Conway had no particular medical knowledge, but, as to most men who have lived in outlandish places, the phenomena of illness were mostly familiar. 'Possibly a heart attack brought on by the high altitude,' he diagnosed, stooping over the unknown man. 'We can do very little for him out here — there's no shelter from this infernal wind. Better get him inside the cabin, and ourselves too. We haven't an idea where we are, and it's hopeless to make a move until daylight.'`,

                passage: `Suddenly Lord John, who was walking first, halted with uplifted hand.

'Look at this!' said he. 'By George, this must be the trail of the father of all birds!'

An enormous three-toed track was imprinted in the soft mud before us. The creature, whatever it was, had crossed the swamp and had passed on into the forest. We all stopped to examine that monstrous spoor. If it were indeed a bird — and what animal could leave such a mark? — its foot was so much larger than an ostrich's that its height upon the same scale must be enormous. Lord John looked eagerly round him and slipped two cartridges into his elephant-gun.

'I'll stake my good name as a shikaree (hunter),' said he, 'that the track is a fresh one. The creature has not passed ten minutes. Look how the water is still oozing into that deeper print! By Jove! See, here is the mark of a little one!'

Sure enough, smaller tracks of the same general form were running parallel to the larger ones.

'But what do you make of this?' cried Professor Summerlee triumphantly, pointing to what looked like the huge print of a five-fingered human hand appearing among the three-toed marks.

'Wealden!' cried Challenger, in an ecstasy. 'I've seen them in the Wealden clay. It is a creature walking erect upon three-toed feet, and occasionally putting one of its five-fingered fore-paws upon the ground. Not a bird, my dear Roxton — not a bird.'

'A beast?'

'No; a reptile — a dinosaur. Nothing else could have left such a track. They puzzled a worthy Sussex doctor some ninety years ago; but who in the world could have hoped — hoped — to have seen a sight like that?'

His words died away into a whisper, and we all stood motionless in amazement. Following the tracks, we had left the morass and passed through a screen of brushwood and trees. Beyond was an open glade, and in this were five of the most extraordinary creatures that I have ever seen. Crouching down among the bushes, we observed them at our leisure.

There were, as I say, five of them, two being adults and three young ones. In size they were enormous. Even the babies were as big as elephants, while the two large ones were far beyond all creatures I have ever seen. They had slate-coloured skin, which was scaled like a lizard's and shimmered where the sun shone upon it. All five were sitting up, balancing themselves upon their broad, powerful tails and their huge three-toed hind feet, while with their small five-fingered front feet they pulled down the branches upon which they browsed. I do not know that I can bring their appearance home to you better than by saying that they looked like monstrous kangaroos, twenty feet in length, and with skin like black crocodiles.

I do not know how long we stayed motionless gazing at this marvellous spectacle. A strong wind blew towards us and we were well concealed, so there was no chance of discovery. From time to time the little ones played round their parents in unwieldy gambols, the great beasts bounding into the air and falling with dull thuds upon the earth. The strength of the parents seemed to be limitless, for one of them, having some difficulty in reaching a bunch of foliage which grew upon a considerable-sized tree, put his forelegs round the trunk and tore it down as if it had been a sapling. The action seemed, as I thought, to show not only the great development of its muscles, but also the small one of its brain, for the whole weight came crashing down upon the top of it, and it uttered a series of shrill yelps to show that, big as it was, there was a limit to what it could endure. The incident made it think, apparently, that the neighbourhood was dangerous, for it slowly lurched off through the wood, followed by its mate and its three enormous infants. We saw the shimmering slaty gleam of their skins between the tree-trunks, and their heads undulating high above the brushwood. Then they vanished from our sight.

I looked at my comrades. Lord John was standing at gaze with his finger on the trigger of his elephant-gun, his eager hunter's soul shining from his fierce eyes. What would he not give for one such head to place between the two crossed oars above the mantelpiece in his snuggery at the Albany! And yet his reason held him in, for all our exploration of the wonders of this unknown land depended upon our presence being concealed from its inhabitants. The two professors were in silent ecstasy. In their excitement they had unconsciously seized each other by the hand, and stood like two children in the presence of a marvel.`,

            return (
                <button
                    onClick={() => onClick(book)}
                    className={`card-glow group relative w-full rounded-2xl overflow-hidden bg-card border border-border transition-all duration-500 ease-out cursor-pointer text-left page-enter stagger-${index + 1}`}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}

                    aria-label={`Open ${book.name}`}
